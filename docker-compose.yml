services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sding
      POSTGRES_USER: sding
      POSTGRES_PASSWORD: sding_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sding"]
      interval: 5s
      timeout: 3s
      retries: 5

  sding:
    image: sding:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: sding
      POSTGRES_USER: sding
      POSTGRES_PASSWORD: sding_dev
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-gemini-2.0-flash}"
      LLM_FAST_MODEL: "${LLM_FAST_MODEL:-gemini-2.0-flash}"
      JWT_SECRET: "change-me-in-production-use-a-long-random-string"
      LLM_ENCRYPTION_KEY: "change-me-in-production-32-bytes"
      ALLOWED_ORIGINS: "*"

volumes:
  pgdata:
