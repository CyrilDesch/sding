services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sding
      POSTGRES_USER: sding
      POSTGRES_PASSWORD: change-me-in-production
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sding"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
